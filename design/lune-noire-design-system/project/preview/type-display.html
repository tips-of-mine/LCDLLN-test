<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lune Noire — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:var(--ln-bg); color:var(--ln-text); }
  .wrap { padding: 24px 28px; display:flex; flex-direction:column; gap:6px; }
  .broken { font-family: var(--font-display-broken); font-size: 46px; line-height:1; color:#F2F4F8; text-shadow: 0 2px 0 rgba(0,0,0,.4); }
  .title  { font-family: var(--font-display); font-weight:700; font-size: 28px; letter-spacing:.14em; color:#F2F4F8; }
  .sub    { font-family: var(--font-display); font-weight:500; font-size: 16px; letter-spacing:.22em; text-transform:uppercase; color:#E8C56E; }
  .spec   { margin-top:6px; font-family: ui-monospace, monospace; font-size:10.5px; color:var(--ln-muted); letter-spacing:.08em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="broken">Les Chroniques</div>
  <div class="title">DE LA LUNE NOIRE</div>
  <div class="sub">Édition des morts • Version 1.0</div>
  <div class="spec">Windlass 700 / 46px  •  Windlass 700 / 28px / .14em  •  Windlass 500 / 16px / CAPITALES</div>
</div>
</body>
</html>
