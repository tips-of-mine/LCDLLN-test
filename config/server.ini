; Endpoints serveur du client LCDLLN — genere automatiquement si absent.
; Editez ces valeurs pour pointer le client vers prod / preprod / dev,
; puis relancez le jeu. Source unique : aucune recompilation necessaire.
; (L'adresse du shard n'est PAS ici : elle est annoncee par le master.)

[client]
; Hote/IP du master pour la connexion TCP (AUTH, liste des royaumes).
master_tcp_host = 10.0.4.133
; Port TCP du master.
master_port = 3840
; Hote/IP du master pour les acces HTTPS (portail embarque).
master_https_host = 10.0.4.133
; Origine HTTP du tunnel embarque du master (schema://hote:port).
master_embedded_http_origin = http://10.0.4.133:3842
; URL absolue de la sonde /status (sert aussi a deriver l'hote master).
status_api_url = http://10.0.4.133:3842/status
; URL du portail web de recuperation de mot de passe.
web_portal_reset_url = https://lcdlln-portal.tips-of-mine.com/password-recovery
