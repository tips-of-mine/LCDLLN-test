<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lune Noire — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:var(--ln-bg); color:var(--ln-text); font-family:var(--font-ui); }
  .wrap { padding:22px; display:flex; gap:14px; align-items:flex-end; }
  .box { width:78px; height:78px; background:var(--ln-panel); border:1px solid var(--ln-border); box-shadow: var(--shadow-1); display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px; }
  .box .n { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ln-text); }
  .box .v { font-family:var(--font-mono); font-size:10px; color:var(--ln-muted); }
  .note { margin-left:auto; font-family:var(--font-body); font-style:italic; font-size:12px; color:var(--ln-muted); max-width:220px; text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <div class="box" style="border-radius:4px"><div class="n">xs</div><div class="v">4px</div></div>
  <div class="box" style="border-radius:6px"><div class="n">sm · orcs</div><div class="v">6px</div></div>
  <div class="box" style="border-radius:8px"><div class="n">md · default</div><div class="v">8px</div></div>
  <div class="box" style="border-radius:12px"><div class="n">lg · démons</div><div class="v">12px</div></div>
  <div class="box" style="border-radius:18px"><div class="n">xl · divins</div><div class="v">18px</div></div>
  <div class="note">Radius is a race signal:<br>Orcs brutal (6) → Divins celestial (18).</div>
</div>
</body>
</html>
