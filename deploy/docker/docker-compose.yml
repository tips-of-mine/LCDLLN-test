# ============================================================
# M24.4 — LCDLLN stack locale (MySQL 8 + Master + Shard)
# ============================================================
# Services :
#   mysql   — MySQL 8.0 avec schéma LCDLLN (lcdlln_master)
#   master  — Master server (lcdlln_server, Dockerfile.master)
#   shard   — Shard server (lcdlln_shard, Dockerfile.shard)
#
# Bundle CI : le zip Linux contient deploy/docker/ prêt à l’emploi (bin/, db/, config/, game/data/).
#
# Démarrage (depuis ce répertoire) :
#   docker compose up -d --build
#
# Si le binaire CI exige glibc ≥ 2.38, l’image doit être Ubuntu 24.04 (Dockerfile.master).
# Erreur « GLIBC_2.38 not found » = ancienne image ou Dockerfile obsolète sur le serveur :
#   1) Mettre à jour deploy/docker/ depuis le dépôt (Dockerfiles ubuntu:24.04).
#   2) docker compose build --no-cache master shard && docker compose up -d
#
# Portail web (optionnel) :
#   docker compose --profile portal up -d
#
# Arrêt :
#   docker compose down
#
# Données persistantes : répertoires sous ./data/ (bind mounts), pas de volumes Docker nommés.
# Supprimer la base : arrêter les conteneurs puis effacer ./data/mysql (ou tout ./data/).
# ============================================================

networks:
  traefik_front_network:
    external: true
  back_lcdlln-net:
    driver: bridge
    attachable: true

services:

  mysql:
    image: mysql:8.0
    container_name: lcdlln-mysql
    restart: unless-stopped
    networks:
      - back_lcdlln-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lcdlln_root_dev}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-lcdlln_master}
      MYSQL_USER:          ${MYSQL_USER:-lcdlln_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-lcdlln_pass_dev}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_fix_schema_v1_checksum.sql:/docker-entrypoint-initdb.d/02_fix_schema_v1_checksum.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-lcdlln_user}",
             "-p${MYSQL_PASSWORD:-lcdlln_pass_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    # Tag explicite : évite de réutiliser un vieux lcdlln-master:latest encore basé sur ubuntu:22.04.
    image: lcdlln-master:ubuntu-24.04
    # Ne pas tenter de tirer lcdlln-master depuis Docker Hub (images locales uniquement).
    pull_policy: build
    container_name: lcdlln-master
    restart: unless-stopped
    networks:
      - back_lcdlln-net
      - traefik_front_network
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MASTER_PORT:-3840}:3840"
      # HTTP embarqué (même processus que lcdlln_server) : /status, /healthz, /readyz, /metrics
      - "${MASTER_HEALTH_PORT:-3842}:3842"
    volumes:
      # Dossier entier : évite l’erreur « not a directory » si master.config.json manquait
      # et qu’un répertoire homonyme avait été créé sur l’hôte.
      - ./config:/app/host-config:ro
      - ./game/data:/app/game/data:ro
      - ./data/logs/master:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3840"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["-log", "-console"]

  shard:
    build:
      context: .
      dockerfile: Dockerfile.shard
    image: lcdlln-shard:ubuntu-24.04
    pull_policy: build
    container_name: lcdlln-shard
    restart: unless-stopped
    networks:
      - back_lcdlln-net
      - traefik_front_network
    depends_on:
      master:
        condition: service_healthy
    ports:
      - "${SHARD_PORT:-3843}:3843"
    volumes:
      - ./config:/app/host-config:ro
      - ./game/data:/app/game/data:ro
      - ./data/logs/shard:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3843"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["-log", "-console"]

  # -----------------------------------------------------------------
  # Portail web (Next.js) — réseau lcdlln-net ; Traefik en amont (externe au repo)
  # -----------------------------------------------------------------
  web-portal:
    profiles:
      - portal
    build:
      context: ../../web-portal
      dockerfile: Dockerfile
    image: lcdlln-web-portal
    container_name: lcdlln-web-portal
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - back_lcdlln-net
      - traefik_front_network
    environment:
      NODE_ENV: production
      # Même base que le master (migrations exploits / vues stats). Adapter user/mot de passe avec le service mysql.
      DATABASE_URL: mysql://lcdlln_user:lcdlln_pass_dev@mysql:3306/lcdlln_master
    expose:
      - "3000"
    # ports:
    #   - "127.0.0.1:3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_front_network"
# HTTP
      - "traefik.http.routers.docuseal-http.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.docuseal-http.entrypoints=http"
# HTTPS
      - "traefik.http.routers.docuseal-https.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.docuseal-https.entrypoints=https"
      - "traefik.http.routers.docuseal-https.service=docuseal-service"
      - "traefik.http.routers.docuseal-https.tls=true"
      - "traefik.http.routers.docuseal-https.middlewares=docuseal-middlewares"
# Middleware
#      - "traefik.http.middlewares.docuseal-middlewares.headers.SSLRedirect=true"
      - "traefik.http.middlewares.docuseal-middlewares.headers.STSSeconds=15552000"
#      - "traefik.http.middlewares.docuseal-middlewares.headers.customResponseHeaders"
#      - "traefik.http.middlewares.docuseal-middlewares.headers.browserXSSFilter=true"
#      - "traefik.http.middlewares.docuseal-middlewares.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.docuseal-middlewares.headers.forceSTSHeader=true"
#      - "traefik.http.middlewares.docuseal-middlewares.headers.SSLHost=tips-of-mine.com"
      - "traefik.http.middlewares.docuseal-middlewares.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.docuseal-middlewares.headers.STSPreload=true"
# Service
      - "traefik.http.services.docuseal-service.loadbalancer.server.port=3000"