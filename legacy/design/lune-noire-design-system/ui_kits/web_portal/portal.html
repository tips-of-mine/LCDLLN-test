/* ======================================================
   ICÔNES SVG (remplacent les emoji du portail actuel)
====================================================== */
const Icon = ({ name, size = 20 }) => {
  const s = { width: size, height: size, stroke: 'currentColor', fill: 'none', strokeWidth: 1.4, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const icons = {
    moon:    <svg viewBox="0 0 24 24" style={s}><path d="M15 3a9 9 0 1 0 6 10c-4 0-6-4-6-10z"/></svg>,
    trophy:  <svg viewBox="0 0 24 24" style={s}><path d="M6 2h12v8a6 6 0 0 1-12 0V2zM4 2h2M18 2h2M12 14v4M8 22h8M12 18v4"/></svg>,
    shield:  <svg viewBox="0 0 24 24" style={s}><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6z"/></svg>,
    scroll:  <svg viewBox="0 0 24 24" style={s}><path d="M6 4h10l2 3v13H6zM9 9h8M9 13h8M9 17h5"/></svg>,
    bug:     <svg viewBox="0 0 24 24" style={s}><ellipse cx="12" cy="13" rx="5" ry="6"/><path d="M9 7a3 3 0 0 1 6 0M4 11h3M17 11h3M4 16h3M17 16h3M4 21h3v-2M17 21h-3v-2"/></svg>,
    chat:    <svg viewBox="0 0 24 24" style={s}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
    mail:    <svg viewBox="0 0 24 24" style={s}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>,
    user:    <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>,
    key:     <svg viewBox="0 0 24 24" style={s}><circle cx="8" cy="15" r="4"/><path d="M12 11l8-8M18 6l2 2M16 8l2 2"/></svg>,
    map:     <svg viewBox="0 0 24 24" style={s}><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3z"/><path d="M9 4v13M15 7v13"/></svg>,
    sword:   <svg viewBox="0 0 24 24" style={s}><path d="M3 21l6-6M9 3l12 12-3 3L6 6 9 3zM12 6l3 3"/></svg>,
    server:  <svg viewBox="0 0 24 24" style={s}><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1" fill="currentColor" stroke="none"/></svg>,
    check:   <svg viewBox="0 0 24 24" style={s}><polyline points="20,6 9,17 4,12"/></svg>,
    lock:    <svg viewBox="0 0 24 24" style={s}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>,
    bell:    <svg viewBox="0 0 24 24" style={s}><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M10 21a2 2 0 0 0 4 0"/></svg>,
    arrow:   <svg viewBox="0 0 24 24" style={s}><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
    info:    <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>,
  };
  return icons[name] || null;
};

/* ======================================================
   HEADER
====================================================== */
function Header({ page, setPage, loggedIn, setLoggedIn }) {
  const [open, setOpen] = useState(false);
  const navLinks = [
    { id: 'roadmap', label: 'Roadmap' },
    { id: 'support', label: 'Support' },
    { id: 'bugs',    label: 'Bugs' },
    { id: 'player',  label: 'Espace joueur' },
  ];
  return (
    <header className="wp-header">
      <a className="wp-logo" onClick={() => { setPage('home'); setOpen(false); }} style={{ cursor: 'pointer' }}>
        <div className="wp-logo-moon" />
        <span className="wp-logo-text">Les Chroniques de la Lune Noire</span>
      </a>
      <button className="wp-nav-toggle" onClick={() => setOpen(o => !o)}>{open ? '✕' : '☰'}</button>
      <nav className={`wp-nav ${open ? 'open' : ''}`} onClick={() => setOpen(false)}>
        {navLinks.map(l => (
          <a key={l.id} className={page === l.id ? 'active' : ''} onClick={() => setPage(l.id)} style={{ cursor: 'pointer' }}>{l.label}</a>
        ))}
        {loggedIn
          ? <a onClick={() => setLoggedIn(false)} style={{ cursor: 'pointer' }}>Déconnexion</a>
          : <a className="cta" onClick={() => setPage('login')} style={{ cursor: 'pointer' }}>Connexion</a>
        }
      </nav>
    </header>
  );
}

/* ======================================================
   FOOTER
====================================================== */

        <a style={{ cursor: 'pointer' }}>CGU</a>
        <a href="https://discord.gg/" target="_blank">Discord</a>
      </div>
    </footer>
  );
}

/* ======================================================
   PAGE ACCUEIL
====================================================== */

            <div style={{ fontFamily: 'var(--font-display)', fontSize: 12.5, letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--ln-text)' }}>{q.label}</div>

      {/* Server status */}
      <p className="wp-section-title" style={{ marginTop: 32 }}>État des royaumes</p>
      <div className="wp-card">
        {[
          { name: 'Morneplaine', meta: 'PvE · 1 842 joueurs · 28 ms', status: 'ok',   label: 'En ligne' },
          { name: 'Korvath',     meta: 'PvP · 2 734 joueurs · 42 ms', status: 'warn', label: 'Saturé' },
          { name: 'Cendrebois',  meta: 'RP · 612 joueurs · 35 ms',    status: 'ok',   label: 'En ligne' },
          { name: 'Sous-Ombre',  meta: 'Maintenance — retour à 21h',  status: 'err',  label: 'Hors ligne' },
        ].map(s => (
          <div key={s.name} className="wp-server-row">
            <div>
              <div className="wp-server-name">{s.name}</div>
              <div className="wp-server-meta">{s.meta}</div>

/* ======================================================
   PAGE CONNEXION
====================================================== */
function LoginPage({ setPage, setLoggedIn }) {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const submit = () => {
    if (!id || !pw) { setErr('Veuillez remplir tous les champs.'); return; }
    setErr(''); setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (pw === 'wrong') { setErr('Identifiant ou mot de passe incorrect.'); return; }
      setLoggedIn(true); setPage('player');
    }, 1200);
  };

  return (
    <main className="wp-main narrow" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 48 }}>
      <div style={{ textAlign: 'center', marginBottom: 32 }}>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'radial-gradient(circle at 32% 30%, #2a2330 0%, #0B0712 55%, #000 100%)', border: '1px solid #1a1420', boxShadow: '0 0 30px rgba(74,123,184,.4)', margin: '0 auto 18px' }} />
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20, letterSpacing: '.2em', textTransform: 'uppercase', color: 'var(--ln-text)', marginBottom: 6 }}>Connexion</div>
        <div style={{ fontFamily: 'var(--font-body)', fontStyle: 'italic', fontSize: 14, color: 'var(--ln-muted)' }}>Accédez à votre espace joueur</div>
      </div>

      <div className="wp-card" style={{ width: '100%', maxWidth: 440, padding: 28 }}>
        {err && <div className="wp-alert error" style={{ marginBottom: 16 }}><span className="wp-alert-icon">✕</span>{err}</div>}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Field label="Identifiant ou courriel" value={id} onChange={setId} placeholder="votre login ou adresse" autoFocus />
          <Field label="Mot de passe" type="password" value={pw} onChange={setPw} placeholder="votre mot de passe" />
          <Button kind="primary" fullWidth loading={loading} onClick={submit}>
            {loading ? 'Connexion…' : 'Se connecter'}
          </Button>
        </div>
        <div style={{ marginTop: 18, paddingTop: 18, borderTop: '1px solid var(--ln-border)', textAlign: 'center' }}>
          <a onClick={() => setPage('recovery')} style={{ cursor: 'pointer', fontFamily: 'var(--font-ui)', fontSize: 10.5, letterSpacing: '.2em', textTransform: 'uppercase' }}>Mot de passe oublié ?</a>
        </div>
      </div>
      <p style={{ fontFamily: 'var(--font-body)', fontStyle: 'italic', fontSize: 12.5, color: 'var(--ln-muted)', textAlign: 'center', maxWidth: 400, marginTop: 20 }}>
        Utilisez le même identifiant et mot de passe que pour le client jeu. Le compte est créé dans le jeu lors de la première connexion.
      </p>
      <div style={{ marginTop: 12 }}>
        <span style={{ fontFamily: 'var(--font-body)', fontStyle: 'italic', fontSize: 12, color: 'var(--ln-muted)' }}>Démo : mot de passe = « wrong » pour voir l'erreur, n'importe quel autre mot de passe se connecte.</span>
      </div>
    </main>
  );
}

  const [form, setForm] = useState({ title: '', cat: 'gameplay', desc: '', steps: '' });
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const set = k => v => setForm(s => ({ ...s, [k]: v }));

  const submit = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setSent(true); }, 1000);
  };

  return (
    <main className="wp-main narrow">
      <div className="wp-page-header">
        <h1>Signaler un bug</h1>
        <p>Chaque signalement améliore le jeu et vous rapproche d'un nouvel exploit.</p>
      </div>

      <div className="wp-grid wp-grid-3" style={{ marginBottom: 32 }}>
        {[
          { icon: 'info',   title: '1. Identifier', desc: 'Notez les étapes pour reproduire le comportement.' },

      <p className="wp-section-title">Paliers d'exploits</p>
      <p className="wp-section-sub">20 niveaux — de 5 à 100 signalements. Un exploit exclusif à chaque palier.</p>

function RecoveryPage() {

        {[[1,'q1','a1'],[2,'q2','a2'],[3,'q3','a3']].map(([n, qk, ak]) => (
          <div key={n} className="ln-form-grid cols-2" style={{ marginBottom: 0 }}>

/* ======================================================
   APPLICATION PRINCIPALE
====================================================== */
function App() {
  const [page, setPageRaw] = useState(() => localStorage.getItem('wp_page') || 'home');
  const [loggedIn, setLoggedIn] = useState(false);
  const [animKey, setAnimKey] = useState(0);

  const setPage = (p) => {
    setPageRaw(p);
    setAnimKey(k => k + 1);
    localStorage.setItem('wp_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const renderPage = () => {
    switch (page) {
      case 'home':     return <HomePage setPage={setPage} loggedIn={loggedIn} />;
      case 'login':    return <LoginPage setPage={setPage} setLoggedIn={setLoggedIn} />;
      case 'roadmap':  return <RoadmapPage />;
      case 'support':  return <SupportPage setPage={setPage} />;
      case 'bugs':     return <BugsPage loggedIn={loggedIn} setPage={setPage} />;
      case 'player':   return <PlayerPage loggedIn={loggedIn} setPage={setPage} />;
      case 'exploits': return <ExploitsPage />;
      case 'recovery': return <RecoveryPage />;
      case 'profile':  return <ProfilePage setPage={setPage} />;
      default:         return <HomePage setPage={setPage} loggedIn={loggedIn} />;
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header page={page} setPage={setPage} loggedIn={loggedIn} setLoggedIn={setLoggedIn} />
      <div key={animKey} className="ln-screen-enter" style={{ flex: 1 }}>
        {renderPage()}
      </div>
      <Footer setPage={setPage} />
    </div>
  );
}
