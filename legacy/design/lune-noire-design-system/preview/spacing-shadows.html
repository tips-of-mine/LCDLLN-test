<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lune Noire — Shadows & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:var(--ln-bg); color:var(--ln-text); font-family:var(--font-ui); }
  .wrap { padding:26px 24px; display:grid; grid-template-columns: repeat(4, 1fr); gap:18px; }
  .box { aspect-ratio:1.4/1; background:var(--ln-panel); border:1px solid var(--ln-border); border-radius:var(--radius-md); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  .box .n { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ln-text); }
  .box .d { font-family:var(--font-mono); font-size:9.5px; color:var(--ln-muted); text-align:center; padding:0 8px; }
  .s1 { box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -1px 0 rgba(0,0,0,.6); }
  .s2 { box-shadow: 0 4px 16px rgba(0,0,0,.5); }
  .s3 { box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  .sg { box-shadow: 0 0 0 1px rgba(232,197,110,.35), 0 0 24px rgba(232,197,110,.18); border-color:#E8C56E; }
</style>
</head>
<body>
<div class="wrap">
  <div class="box s1"><div class="n">shadow-1 / inset</div><div class="d">carved stone</div></div>
  <div class="box s2"><div class="n">shadow-2 / lift</div><div class="d">0 4 16 .5</div></div>
  <div class="box s3"><div class="n">shadow-3 / panel</div><div class="d">0 8 32 .6</div></div>
  <div class="box sg"><div class="n">shadow-glow</div><div class="d">accent · hover</div></div>
</div>
</body>
</html>
