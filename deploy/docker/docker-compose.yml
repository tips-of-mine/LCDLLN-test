# ============================================================
# M24.4 — LCDLLN stack locale (MySQL + Master + portail ; shard en option)
# ============================================================
# Services :
#   mysql      — MySQL 8.0 avec schéma LCDLLN (lcdlln_master)
#   master     — Master server (lcdlln_server, Dockerfile.master)
#   web-portal — Next.js (sources ./web-portal dans le zip CI)
#   shard      — Shard (profil Compose « shard », désactivé par défaut ; binaire toujours dans le zip)
#
# Bundle CI : le zip Linux contient deploy/docker/ prêt à l’emploi (bin/, db/, config/, game/data/, web-portal/).
#
# Démarrage (zip décompressé, depuis ce répertoire) :
#   docker compose up -d
# Premier lancement : construction des images si absentes. Après modification Docker/sources :
#   docker compose up -d --build
#
# Si le binaire CI exige glibc ≥ 2.38, l’image doit être Ubuntu 24.04 (Dockerfile.master).
# Erreur « GLIBC_2.38 not found » = ancienne image ou Dockerfile obsolète sur le serveur :
#   1) Mettre à jour deploy/docker/ depuis le dépôt (Dockerfiles ubuntu:24.04).
#   2) docker compose build --no-cache master web-portal && docker compose up -d
#      (shard : docker compose build shard && docker compose --profile shard up -d)
#
# Portail web : inclus dans up -d. Local : http://127.0.0.1:3000 — Labels Traefik : service
# web-portal ; copie : traefik-web-portal.labels.reference.yml
#
# Arrêt :
#   docker compose down
#
# Données persistantes : répertoires sous ./data/ (bind mounts), pas de volumes Docker nommés.
# Supprimer la base : arrêter les conteneurs puis effacer ./data/mysql (ou tout ./data/).
# ============================================================

networks:
  # Créé automatiquement au premier up (plus besoin de docker network create).
  # Pour réutiliser un réseau Traefik déjà existant avec le même nom : le déclarer en external: true
  # et supprimer la définition ci-dessous (voir README).
  traefik_front_network:
    name: traefik_front_network
    driver: bridge
  back_lcdlln-net:
    driver: bridge
    attachable: true

services:

  mysql:
    image: mysql:8.0
    container_name: lcdlln-mysql
    restart: unless-stopped
    networks:
      - back_lcdlln-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lcdlln_root_dev}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-lcdlln_master}
      MYSQL_USER:          ${MYSQL_USER:-lcdlln_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-lcdlln_pass_dev}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_fix_schema_v1_checksum.sql:/docker-entrypoint-initdb.d/02_fix_schema_v1_checksum.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-lcdlln_user}",
             "-p${MYSQL_PASSWORD:-lcdlln_pass_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    # Tag explicite : évite de réutiliser un vieux lcdlln-master:latest encore basé sur ubuntu:22.04.
    image: lcdlln-master:ubuntu-24.04
    # Ne pas tenter de tirer lcdlln-master depuis Docker Hub (images locales uniquement).
    pull_policy: build
    container_name: lcdlln-master
    restart: unless-stopped
    networks:
      - back_lcdlln-net
      - traefik_front_network
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MASTER_PORT:-3840}:3840"
      # HTTP embarqué (même processus que lcdlln_server) : /status, /healthz, /readyz, /metrics
      - "${MASTER_HEALTH_PORT:-3842}:3842"
    volumes:
      - ./config/master.config.json:/app/config.json:ro
      - ./game/data:/app/game/data:ro
      - ./data/logs/master:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3840"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Shard : hors stack par défaut (profil « shard ») — à réactiver quand le gameplay le nécessite.
  shard:
    profiles:
      - shard
    build:
      context: .
      dockerfile: Dockerfile.shard
    image: lcdlln-shard:ubuntu-24.04
    pull_policy: build
    container_name: lcdlln-shard
    restart: unless-stopped
    networks:
      - back_lcdlln-net
      - traefik_front_network
    depends_on:
      master:
        condition: service_healthy
    ports:
      - "${SHARD_PORT:-3843}:3843"
    volumes:
      - ./config/shard.config.json:/app/config.json:ro
      - ./game/data:/app/game/data:ro
      - ./data/logs/shard:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3843"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -----------------------------------------------------------------
  # Portail web (Next.js) — démarré avec docker compose up -d (pas de profil)
  # -----------------------------------------------------------------
  web-portal:
    build:
      # Copié dans ce dossier par scripts/pack-linux-docker-bundle.sh (ZIP CI autonome).
      context: ./web-portal
      dockerfile: Dockerfile
    image: lcdlln-web-portal
    container_name: lcdlln-web-portal
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      master:
        condition: service_healthy
    networks:
      - back_lcdlln-net
      - traefik_front_network
    environment:
      NODE_ENV: production
      # Aligné sur MYSQL_USER / MYSQL_PASSWORD / MYSQL_DATABASE du service mysql
      DATABASE_URL: mysql://${MYSQL_USER:-lcdlln_user}:${MYSQL_PASSWORD:-lcdlln_pass_dev}@mysql:3306/${MYSQL_DATABASE:-lcdlln_master}
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${WEB_PORTAL_PORT:-3000}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_front_network"
      - "traefik.http.routers.lcdlln-portal-http.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-portal-http.entrypoints=http"
      - "traefik.http.routers.lcdlln-portal-https.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-portal-https.entrypoints=https"
      - "traefik.http.routers.lcdlln-portal-https.service=lcdlln-portal-service"
      - "traefik.http.routers.lcdlln-portal-https.tls=true"
      - "traefik.http.routers.lcdlln-portal-https.middlewares=lcdlln-portal-middlewares"
      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSSeconds=15552000"
      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSPreload=true"
      - "traefik.http.services.lcdlln-portal-service.loadbalancer.server.port=3000"