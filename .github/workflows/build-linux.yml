# Build engine (Linux, CMake + vcpkg + Ninja) + bundle Docker (MySQL + Master + Shard)
name: Build Linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libmysqlclient-dev \
            libmysqlclient21 \
            libvulkan-dev vulkan-utility-libraries-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev \
            pkg-config \
            zip

      - name: Clone vcpkg
        run: git clone https://github.com/Microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"

      - name: Bootstrap vcpkg
        run: bash "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-linux
        run: cmake --preset linux-x64-release

      - name: Build (Release)
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --build --preset linux-x64-release

      - name: Assemble deploy/docker bundle
        env:
          BUILD_DIR: ${{ github.workspace }}/build/linux-x64-release
        run: bash "${{ github.workspace }}/scripts/pack-linux-docker-bundle.sh"

      - name: Zip Docker stack (deploy/docker)
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          ZIP_NAME="lcdlln-docker-linux-${{ github.sha }}.zip"
          zip -r "$ZIP_NAME" deploy/docker \
            -x "*.git*" -x "*__pycache__*"
          ls -la "$ZIP_NAME"

      - name: Upload Docker bundle artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: lcdlln-docker-linux-${{ github.sha }}
          path: lcdlln-docker-linux-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 7
