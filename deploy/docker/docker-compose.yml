# ============================================================
# M24.4 — LCDLLN stack locale (MySQL + Master + Shard + portail + phpMyAdmin)
# ============================================================
# Services :
#   mysql      — MySQL 8.0 avec schéma LCDLLN (lcdlln_master)
#   master     — Master server (lcdlln_server, Dockerfile.master)
#   shard      — Monde jeu (lcdlln_shard) : enregistrement + heartbeat vers le Master
#   web-portal — Next.js (sources ./web-portal dans le zip CI)
#   phpmyadmin — phpMyAdmin (visualisation / administration de la base MySQL)
#
# Bundle CI : le zip Linux contient deploy/docker/ prêt à l’emploi (bin/, sql/, config/, game/data/, web-portal/).
#
# Démarrage (zip décompressé, depuis ce répertoire) :
#   docker compose up -d
# Premier lancement : construction des images si absentes. Après modification Docker/sources :
#   docker compose up -d --build
#
# Si le binaire CI exige glibc ≥ 2.38, l’image doit être Ubuntu 24.04 (Dockerfile.master).
# Erreur « GLIBC_2.38 not found » = ancienne image ou Dockerfile obsolète sur le serveur :
#   1) Mettre à jour deploy/docker/ depuis le dépôt (Dockerfiles ubuntu:24.04).
#   2) docker compose build --no-cache master web-portal && docker compose up -d
#      (shard : docker compose build shard && docker compose up -d)
#
# Portail web : inclus dans up -d. Local : http://127.0.0.1:3000 — Labels Traefik : service
# web-portal ; copies réf. : traefik-web-portal.labels.reference.yml, traefik-master.labels.reference.yml
#
# Arrêt :
#   docker compose down
#
# Données persistantes : répertoires sous ./data/ (bind mounts), pas de volumes Docker nommés.
# Supprimer la base : arrêter les conteneurs puis effacer ./data/mysql (ou tout ./data/).
# ============================================================

networks:
  traefik_front_network:
    external: true
  back_lcdlln_network:
    driver: bridge
    attachable: true

services:

  mysql:
    image: mysql:8.0
    container_name: lcdlln-mysql
    restart: unless-stopped
    networks:
      - back_lcdlln_network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lcdlln_root_dev}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-lcdlln_master}
      MYSQL_USER:          ${MYSQL_USER:-lcdlln_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-lcdlln_pass_dev}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/02_fix_schema_v1_checksum.sql:/docker-entrypoint-initdb.d/02_fix_schema_v1_checksum.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-lcdlln_user}",
             "-p${MYSQL_PASSWORD:-lcdlln_pass_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    # Tag explicite : évite de réutiliser un vieux lcdlln-master:latest encore basé sur ubuntu:22.04.
    image: lcdlln-master:ubuntu-24.04
    # Ne pas tenter de tirer lcdlln-master depuis Docker Hub (images locales uniquement).
    pull_policy: build
    container_name: lcdlln-master
    restart: unless-stopped
    networks:
      - back_lcdlln_network
      - traefik_front_network
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      # Accès LAN typique : http://<ip-hôte>:3842/status , TCP jeu <ip-hôte>:3840
      - "${MASTER_PUBLISH_ADDR:-0.0.0.0}:${MASTER_PORT:-3840}:3840"
      - "${MASTER_PUBLISH_ADDR:-0.0.0.0}:${MASTER_HEALTH_PORT:-3842}:3842"
    labels:
      # Pas de Traefik devant le master pour l’instant (serveur joignable uniquement en IP locale, ex. 10.0.4.133).
      # Réactiver traefik.enable=true + labels HTTP/TCP : voir traefik-master.labels.reference.yml
      - "traefik.enable=false"
    volumes:
      - ./config/master.config.json:/app/config.json:ro
      # SMTP : monté depuis config/smtp.local.json (fichier non versionné, créer sur le serveur).
      - ./config/smtp.local.json:/app/smtp.local.json:ro
      - ./game/data:/app/game/data:ro
      - ./data/logs/master:/app/logs
    # HTTP 3842 (/healthz) : le TCP 3840 est le protocole jeu ; nc -z le pollue dans les logs NetServer.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3842/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard:
    build:
      context: .
      dockerfile: Dockerfile.shard
    image: lcdlln-shard:ubuntu-24.04
    pull_policy: build
    container_name: lcdlln-shard
    restart: unless-stopped
    networks:
      - back_lcdlln_network
      - traefik_front_network
    depends_on:
      master:
        condition: service_healthy
    ports:
      - "${SHARD_PORT:-3843}:3843"
      # Replication joueurs (TE.3) : port UDP gameplay (Hello/Input/Snapshot).
      # Lu par ServerApp via la cle `server.listen_port` (defaut 27015).
      # Doit etre joignable depuis chaque client : ouvrir UDP au firewall hote
      # et au pare-feu cloud (SG/UFW/iptables). Voir docs/deployment_udp.md.
      - "${SHARD_UDP_PORT:-27015}:27015/udp"
    volumes:
      - ./config/shard.config.json:/app/config.json:ro
      - ./game/data:/app/game/data:ro
      # TA.4 — autosave perso : CharacterPersistenceStore écrit
      # game/data/persistence/characters/character_<id>.ini à chaque autosave (30 s).
      # Sans ce sous-mount, l'écriture échoue (Read-only file system) car le parent
      # game/data est monté ro pour protéger les assets immuables. Docker permet
      # de superposer un sous-chemin en rw sur un parent ro — c'est ce qu'on fait ici.
      # Le dossier hôte ./data/persistence est créé automatiquement au premier `up`.
      - ./data/persistence:/app/game/data/persistence:rw
      - ./data/logs/shard:/app/logs
    environment:
      SHARD_REGISTER_ENDPOINT: ${SHARD_REGISTER_ENDPOINT:-127.0.0.1:3843}
      # TB.1/TE.3 : endpoint UDP gameplay annonce aux clients via le master
      # (SERVER_LIST). Vide => non annonce (clients ne pourront pas se connecter
      # en gameplay UDP). Format : <ip-publique-joignable-par-le-client>:<port-UDP>.
      SHARD_REGISTER_UDP_ENDPOINT: ${SHARD_REGISTER_UDP_ENDPOINT:-}
      SHARD_NAME: ${SHARD_NAME:-main-shard}
      SHARD_MAX_CAPACITY: ${SHARD_MAX_CAPACITY:-500}
      SHARD_BUILD_VERSION: ${SHARD_BUILD_VERSION:-docker-dev}
      SHARD_DISPLAY_NAME: ${SHARD_DISPLAY_NAME:-Royaume principal}
      SHARD_GAME_MODE: ${SHARD_GAME_MODE:-pve}
      SHARD_RULESET: ${SHARD_RULESET:-cooperative}
      SHARD_REGION: ${SHARD_REGION:-eu-west}
    command:
      - sh
      - -c
      - >-
        exec /app/lcdlln_shard -log -console
        --shard.register.endpoint=$$SHARD_REGISTER_ENDPOINT
        --shard.register.udp_endpoint="$$SHARD_REGISTER_UDP_ENDPOINT"
        --shard.register.name="$$SHARD_NAME"
        --shard.register.max_capacity=$$SHARD_MAX_CAPACITY
        --shard.register.build_version="$$SHARD_BUILD_VERSION"
        --shard.register.display_name="$$SHARD_DISPLAY_NAME"
        --shard.register.game_mode=$$SHARD_GAME_MODE
        --shard.register.ruleset=$$SHARD_RULESET
        --shard.register.region="$$SHARD_REGION"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3844"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -----------------------------------------------------------------
  # Portail web (Next.js) — démarré avec docker compose up -d (pas de profil)
  # -----------------------------------------------------------------
  web-portal:
    build:
      # Copié dans ce dossier par scripts/pack-linux-docker-bundle.sh (ZIP CI autonome).
      context: ./web-portal
      dockerfile: Dockerfile
    image: lcdlln-web-portal
    pull_policy: build
    container_name: lcdlln-web-portal
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      master:
        condition: service_healthy
      shard:
        condition: service_healthy
    networks:
      - back_lcdlln_network
      - traefik_front_network
    volumes:
      # SMTP : web-portal cherche process.cwd()/../config/smtp.local.json = /config/smtp.local.json
      - ./config/smtp.local.json:/config/smtp.local.json:ro
    environment:
      NODE_ENV: production
      # Aligné sur MYSQL_USER / MYSQL_PASSWORD / MYSQL_DATABASE du service mysql
      DATABASE_URL: mysql://${MYSQL_USER:-lcdlln_user}:${MYSQL_PASSWORD:-lcdlln_pass_dev}@mysql:3306/${MYSQL_DATABASE:-lcdlln_master}
    expose:
      - "3000"
    ports:
      - "${WEB_PORTAL_PORT:-3000}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_front_network"
      - "traefik.http.routers.lcdlln-portal-http.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-portal-http.entrypoints=http"
      - "traefik.http.routers.lcdlln-portal-http.service=lcdlln-portal-service"
      - "traefik.http.routers.lcdlln-portal-https.rule=Host(`lcdlln-portal.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-portal-https.entrypoints=https"
      - "traefik.http.routers.lcdlln-portal-https.service=lcdlln-portal-service"
      - "traefik.http.routers.lcdlln-portal-https.tls=true"
      # Doit correspondre au nom du certificatsResolvers (ou certificates) dans la config statique Traefik.
      #- "traefik.http.routers.lcdlln-portal-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
#      - "traefik.http.routers.lcdlln-portal-https.middlewares=lcdlln-portal-middlewares"
#      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSSeconds=15552000"
#      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.forceSTSHeader=true"
#      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSIncludeSubdomains=true"
#      - "traefik.http.middlewares.lcdlln-portal-middlewares.headers.STSPreload=true"
      - "traefik.http.services.lcdlln-portal-service.loadbalancer.server.port=3000"

  # -----------------------------------------------------------------
  # phpMyAdmin — visualisation / administration de la base MySQL
  # -----------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: lcdlln-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - back_lcdlln_network
      - traefik_front_network
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      # Pré-remplir l'utilisateur (connexion manuelle reste nécessaire)
      PMA_USER: ${MYSQL_USER:-lcdlln_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-lcdlln_pass_dev}
      UPLOAD_LIMIT: 64M
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_front_network"
      - "traefik.http.routers.lcdlln-pma-http.rule=Host(`lcdlln-phpmyadmin.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-pma-http.entrypoints=http"
      - "traefik.http.routers.lcdlln-pma-http.service=lcdlln-pma-service"
      - "traefik.http.routers.lcdlln-pma-https.rule=Host(`lcdlln-phpmyadmin.tips-of-mine.com`)"
      - "traefik.http.routers.lcdlln-pma-https.entrypoints=https"
      - "traefik.http.routers.lcdlln-pma-https.service=lcdlln-pma-service"
      - "traefik.http.routers.lcdlln-pma-https.tls=true"
      #- "traefik.http.routers.lcdlln-pma-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.lcdlln-pma-service.loadbalancer.server.port=80"