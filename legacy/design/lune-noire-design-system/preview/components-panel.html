<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lune Noire — Panel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:
    radial-gradient(ellipse 80% 50% at 50% 110%, rgba(74,123,184,.15), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(232,197,110,.08), transparent 70%),
    #070A10;
    color:var(--ln-text); font-family:var(--font-ui); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px 24px; box-sizing:border-box; }
  .panel { width:360px; background: rgba(20,28,40,.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid var(--ln-border); border-radius: var(--radius-md);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), inset 0 -1px 0 rgba(0,0,0,.6), 0 10px 40px rgba(0,0,0,.7); }
  .panel-head { padding:14px 18px; border-bottom:1px solid var(--ln-border); display:flex; justify-content:space-between; align-items:baseline; }
  .panel-head h3 { margin:0; font-family:var(--font-display); font-weight:600; font-size:17px; letter-spacing:.16em; text-transform:uppercase; color:var(--ln-text); }
  .panel-head .v { font-family:var(--font-mono); font-size:10px; color:var(--ln-muted); letter-spacing:.1em; }
  .panel-body { padding:16px 18px; font-family:var(--font-body); font-size:14px; color:var(--ln-muted); line-height:1.55; }
  .panel-foot { padding:10px 18px; border-top:1px solid var(--ln-border); display:flex; justify-content:space-between; font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--ln-muted); }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-head"><h3>Connexion</h3><span class="v">v1.0 · édition des morts</span></div>
  <div class="panel-body">Saisissez votre identifiant et votre mot de passe pour rejoindre la Lune Noire. En cas d'oubli, utilisez le lien de récupération.</div>
  <div class="panel-foot"><span>Entrée valider</span><span>Échap retour</span></div>
</div>
</body>
</html>
