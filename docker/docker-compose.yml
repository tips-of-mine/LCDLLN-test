# ============================================================
# LCDLLN — docker-compose.yml
# ============================================================
# Services :
#   mysql    — MySQL 8.0 avec schema LCDLLN
#   server   — Master server lcdlln_server (binaire pré-compilé)
#
# Démarrage rapide (binaire pré-compilé depuis CI) :
#   1. Copier le binaire CI dans docker/bin/lcdlln_server
#   2. docker-compose up -d
#
# Démarrage build depuis source :
#   docker-compose --profile build up --build
#
# Arrêt :
#   docker-compose down
#
# Arrêt + suppression données MySQL :
#   docker-compose down -v
# ============================================================

version: "3.9"

# ---- Réseau interne -----------------------------------------
networks:
  lcdlln-net:
    driver: bridge

# ---- Volumes persistants ------------------------------------
volumes:
  mysql-data:
    driver: local
  server-logs:
    driver: local

# ---- Services -----------------------------------------------
services:

  # ----------------------------------------------------------
  # MySQL 8.0
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: lcdlln-mysql
    restart: unless-stopped
    networks:
      - lcdlln-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lcdlln_root_dev}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-lcdlln}
      MYSQL_USER:          ${MYSQL_USER:-lcdlln_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-lcdlln_pass_dev}
    ports:
      # Exposé sur localhost uniquement — ne pas exposer en production
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Applique le schéma au premier démarrage
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-lcdlln_user}",
             "-p${MYSQL_PASSWORD:-lcdlln_pass_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Master Server (binaire pré-compilé — approche par défaut)
  # ----------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: lcdlln-server
    restart: unless-stopped
    networks:
      - lcdlln-net
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Ces variables sont injectées dans config.json via le script d'entrée
      LCDLLN_DB_HOST:     mysql
      LCDLLN_DB_PORT:     "3306"
      LCDLLN_DB_NAME:     ${MYSQL_DATABASE:-lcdlln}
      LCDLLN_DB_USER:     ${MYSQL_USER:-lcdlln_user}
      LCDLLN_DB_PASSWORD: ${MYSQL_PASSWORD:-lcdlln_pass_dev}
      LCDLLN_PORT:        ${SERVER_PORT:-3840}
      LCDLLN_HMAC_SECRET: ${LCDLLN_HMAC_SECRET:-dev_secret_change_in_production}
    ports:
      - "${SERVER_PORT:-3840}:3840"
    volumes:
      # Config overridée par le fichier local (modifiable sans rebuild)
      - ./server-config/config.json:/app/config.json:ro
      # Logs persistants
      - server-logs:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3840"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["--port", "${SERVER_PORT:-3840}", "-log", "-console"]

  # ----------------------------------------------------------
  # Master Server (build depuis source — profil optionnel)
  # ----------------------------------------------------------
  server-build:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server.build
    container_name: lcdlln-server-build
    profiles:
      - build
    restart: unless-stopped
    networks:
      - lcdlln-net
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      LCDLLN_DB_HOST:     mysql
      LCDLLN_DB_PORT:     "3306"
      LCDLLN_DB_NAME:     ${MYSQL_DATABASE:-lcdlln}
      LCDLLN_DB_USER:     ${MYSQL_USER:-lcdlln_user}
      LCDLLN_DB_PASSWORD: ${MYSQL_PASSWORD:-lcdlln_pass_dev}
      LCDLLN_PORT:        ${SERVER_PORT:-3840}
      LCDLLN_HMAC_SECRET: ${LCDLLN_HMAC_SECRET:-dev_secret_change_in_production}
    ports:
      - "${SERVER_PORT:-3840}:3840"
    volumes:
      - ./server-config/config.json:/app/config.json:ro
      - server-logs:/app/logs
    command: ["--port", "${SERVER_PORT:-3840}", "-log", "-console"]
