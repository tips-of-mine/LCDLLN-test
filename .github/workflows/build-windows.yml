# Build engine (Windows, CMake + vcpkg + Ninja)
name: Build Windows
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        shell: pwsh
        run: git clone https://github.com/Microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-release
        run: |
          cmake --preset vs2022-x64

      - name: Build (Release)
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          cmake --build --preset vs2022-x64-release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\artifacts"

          # Copie les binaires produits (hors vcpkg)
          Get-ChildItem -Recurse -Path "$env:GITHUB_WORKSPACE" `
            -Include "*.exe","*.dll","*.pdb" |
            Where-Object { $_.FullName -notlike "*\vcpkg\*" } |
            Copy-Item -Destination "$env:GITHUB_WORKSPACE\artifacts" -Force

          # Assets
          $assetsSource = "$env:GITHUB_WORKSPACE\assets"
          if (Test-Path $assetsSource) {
            Copy-Item -Recurse -Path $assetsSource `
              -Destination "$env:GITHUB_WORKSPACE\artifacts\assets" -Force
          }

          # Copie les DLLs MSVC Release depuis VS Redist
          $vcRedistBase = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
          $dlls = @("MSVCP140.dll", "VCRUNTIME140.dll", "VCRUNTIME140_1.dll")
          foreach ($dll in $dlls) {
            $found = Get-ChildItem -Recurse -Path $vcRedistBase -Filter $dll `
              -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*x64*" -and $_.FullName -notlike "*debug_nonredist*" -and $_.FullName -notlike "*onecore*" } |
              Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination "$env:GITHUB_WORKSPACE\artifacts" -Force
              Write-Host "Copié : $($found.FullName)"
            } else {
              Write-Warning "Introuvable : $dll"
            }
          }

          # Copie les DLLs depuis System32
          $system32Dlls = @(
            "C:\Windows\System32\ucrtbase.dll",
            "C:\Windows\System32\vcruntime140d.dll"
          )
          foreach ($f in $system32Dlls) {
            if (Test-Path $f) {
              Copy-Item $f -Destination "$env:GITHUB_WORKSPACE\artifacts" -Force
              Write-Host "Copié : $f"
            } else {
              Write-Warning "Introuvable : $f"
            }
          }

          # Copie VCRUNTIME140D.dll depuis debug_nonredist\x64
          $vcrDebug = Get-ChildItem -Recurse -Path $vcRedistBase `
            -Filter "VCRUNTIME140D.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*debug_nonredist\x64*" } |
            Select-Object -First 1
          if ($vcrDebug) {
            Copy-Item $vcrDebug.FullName -Destination "$env:GITHUB_WORKSPACE\artifacts" -Force
            Write-Host "Copié : $($vcrDebug.FullName)"
          }

          Write-Host "=== Contenu final des artifacts ==="
          Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts" | Select-Object Name, Length

      - name: Diagnostic DLLs
        shell: pwsh
        run: |
          $dumpbin = Get-ChildItem -Recurse `
            -Path "C:\Program Files\Microsoft Visual Studio" `
            -Filter "dumpbin.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1

          Write-Host "=== DLLs dans vcpkg_installed ==="
          Get-ChildItem -Recurse `
            -Path "$env:GITHUB_WORKSPACE\build\vs2022-x64\vcpkg_installed" `
            -Filter "*.dll" -ErrorAction SilentlyContinue |
            Select-Object FullName

          Write-Host "=== Dépendances de toutes les DLLs dans artifacts ==="
          Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts" -Filter "*.dll" |
          ForEach-Object {
            Write-Host "--- $($_.Name) ---"
            & $dumpbin.FullName /dependents $_.FullName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7