# Build engine (Windows + Linux, CMake + vcpkg + Ninja)
# Build engine (Windows, CMake)
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git (Join-Path $env:GITHUB_WORKSPACE 'vcpkg')

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          & (Join-Path $env:GITHUB_WORKSPACE 'vcpkg\bootstrap-vcpkg.bat')

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          cmake --preset vs2022-x64

      - name: Build (Debug)
        shell: pwsh
        run: |
          cmake --build --preset vs2022-x64-debug

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone https://github.com/Microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"

      - name: Bootstrap vcpkg
        run: "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh"

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset linux-x64

      - name: Build
        run: cmake --build --preset linux-x64
