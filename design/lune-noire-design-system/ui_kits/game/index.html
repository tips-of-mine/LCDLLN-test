<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lune Noire — Game Client</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#000; color:var(--ln-text); font-family:var(--font-ui); overflow:hidden; }
  .stage { position:fixed; inset:0; }
  .nav { position:fixed; right:14px; bottom:14px; display:flex; gap:6px; background:rgba(10,13,18,.85); padding:6px; border:1px solid var(--ln-border); border-radius:var(--radius-md); z-index:100; }
  .nav button { background:transparent; border:1px solid transparent; color:var(--ln-muted); font-family:var(--font-ui); font-size:10px; letter-spacing:.18em; text-transform:uppercase; padding:6px 10px; border-radius:var(--radius-sm); cursor:pointer; }
  .nav button.on { background:rgba(74,123,184,.15); border-color:var(--ln-primary); color:var(--ln-accent); }
</style>
</head>
<body data-screen-label="Game Client">
<div id="root" class="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="AuthBackdrop.jsx"></script>
<script type="text/babel" src="AuthScreens.jsx"></script>
<script type="text/babel" src="CharacterAndHud.jsx"></script>

<script type="text/babel">
  const { useState } = React;
  const SCREENS = ['login', 'register', 'shard', 'character', 'hud'];

  function App() {
    const initial = localStorage.getItem('ln_screen') || 'login';
    const [screen, setScreenRaw] = useState(initial);
    const setScreen = (s) => { setScreenRaw(s); localStorage.setItem('ln_screen', s); };

    let view;
    if (screen === 'login')     view = <LoginScreen onRegister={() => setScreen('register')} onShard={() => setScreen('shard')} />;
    else if (screen === 'register') view = <RegisterScreen onBack={() => setScreen('login')} />;
    else if (screen === 'shard')    view = <ShardPickScreen onPick={() => setScreen('character')} />;
    else if (screen === 'character')view = <CharacterCreateScreen onEnter={() => setScreen('hud')} />;
    else                            view = <HudOverlay onExit={() => setScreen('login')} />;

    return (
      <>
        {view}
        <div className="nav">
          {SCREENS.map(s => (
            <button key={s} className={screen === s ? 'on' : ''} onClick={() => setScreen(s)}>{s}</button>
          ))}
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
